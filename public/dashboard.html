<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Truck Tag — Driver Dashboard</title>
  <link rel="stylesheet" href="./styles.css"/>
  <style>
    .driver-header{
      grid-template-columns:auto 1fr auto;
      grid-template-areas:
        "brand spacer actions"
        "title title title";
      align-items:center;
      gap:14px 18px;
      min-height:auto;
      padding:14px 0 12px;
    }
    .driver-header .brand{
      grid-area:brand;
      transform:translateX(10%);
    }
    .driver-header .brand-text{
      font-family:Inter,system-ui,-apple-system,"Segoe UI",Roboto,Arial,sans-serif;
      font-size:1.08rem;
      font-weight:800;
      letter-spacing:-.02em;
      white-space:nowrap;
    }
    .driver-header-actions{
      grid-area:actions;
      justify-self:end;
      transform:translateX(-10%);
    }
    .driver-header-title{
      grid-area:title;
      display:flex;
      justify-content:center;
      justify-self:center;
      width:100%;
      text-align:center;
    }
    .driver-header-title .page-title{margin:0;}
    .tickets{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:12px}
    .ticket-link{
      display:block;padding:14px 16px;border:1px solid var(--border);border-radius:12px;background:#fff;
      text-decoration:none;font-weight:600;text-align:center;box-shadow:var(--shadow)
    }
    .muted-small{color:#6b7280;font-size:12px;margin-top:4px;text-align:center}
    @media (hover:hover) and (pointer:fine){
      .ticket-link:hover{
        background:#dce8f7;
        border-color:#c7d5e4;
        box-shadow:var(--shadow-sm);
      }
    }
    @media (max-width:640px){
      .driver-header{
        gap:12px;
        padding:12px 0 10px;
      }
      .driver-header .brand{
        transform:translateX(4%);
      }
      .driver-header .brand-text{
        font-size:1rem;
        white-space:normal;
      }
      .driver-header-title .page-title{
        font-size:1.45rem;
      }
      .driver-header-actions{
        transform:translateX(-4%);
      }
      .driver-header-actions .btn{
        min-height:40px;
        padding:8px 14px;
      }
    }
  </style>
</head>

<body>
  <header class="site-header">
    <div class="container header-inner driver-header">
      <div class="brand">
        <img src="./assets/img/logo.png" alt="Logo" class="logo">
        <span class="brand-text">Sixty – 3 Trucking Inc</span>
      </div>
      <div class="driver-header-actions">
        <button id="logoutBtn" class="btn header-action-btn" type="button">Log Out</button>
      </div>
      <div class="driver-header-title">
        <h1 class="page-title">Driver Dashboard</h1>
      </div>
    </div>
  </header>

  <main class="container">
    <section class="card intro">
      <h2 id="driverName">Welcome, …</h2>
      <p class="muted">Click a ticket below to open and fill it.</p>

      <div style="margin-top:12px; display:flex; gap:10px; align-items:center; flex-wrap:wrap;">
        <button id="newDraftBtn" class="btn btn-primary" type="button">➕ Draft a Ticket</button>
        <span class="muted-small">No Ticket No needed — Admin will finalize & submit.</span>
      </div>
    </section>

    <section id="tagsWrap" class="card">
      <div id="tags" class="tickets"></div>
      <div id="empty" class="muted-small" style="display:none">No pending tags 🎉</div>
    </section>
  </main>

  <footer class="site-footer">
    <div class="container">
      <small>© <span id="y"></span> Sixty – 3 Trucking Inc</small>
    </div>
  </footer>

  <script>
    document.getElementById('y').textContent = new Date().getFullYear();

    const $ = (s) => document.querySelector(s);

    function guessTags(data){
      if (Array.isArray(data?.pending)) return data.pending;
      if (Array.isArray(data?.tags)) return data.tags;
      for (const k in (data||{})) {
        const v = data[k];
        if (Array.isArray(v) && v.length && typeof v[0]==='object' &&
            ('Status' in v[0] || 'status' in v[0] || 'Ticket No' in v[0] || 'ticketNo' in v[0])) {
          return v;
        }
      }
      return [];
    }

    const getId     = t => t.id ?? t.ticketNo ?? t.TicketNo ?? t['Ticket No'] ?? t.Ticket ?? '';
    const getStatus = t => String(t.status ?? t.Status ?? '').trim().toLowerCase();
    const getEmail  = t => String(t.email ?? t.Email ?? t.assigneeEmail ?? '').trim().toLowerCase();

    function onlyPendingForMe(list, email){
      const em = String(email||'').toLowerCase();
      const hasStatus = (list||[]).some(t => String(t.status ?? t.Status ?? ''));
      const hasEmail  = (list||[]).some(t => String(t.email ?? t.Email ?? t.assigneeEmail ?? ''));
      if (!hasStatus && !hasEmail) return list;
      return (list||[]).filter(t => (hasStatus ? getStatus(t)==='pending' : true) &&
                                    (em ? (hasEmail ? getEmail(t)===em : true) : true));
    }

    function getDateParts(s){
      const raw = String(s || '').trim();
      if (!raw) return null;

      let m = raw.match(/^(\d{4})-(\d{2})-(\d{2})(?:$|[T\s])/);
      if (m) return { yyyy: m[1], mm: m[2], dd: m[3] };

      m = raw.match(/^(\d{1,2})[\/\-](\d{1,2})[\/\-](\d{2,4})$/);
      if (!m) return null;
      return {
        yyyy: m[3].length === 2 ? `20${m[3]}` : m[3],
        mm: String(m[1]).padStart(2,'0'),
        dd: String(m[2]).padStart(2,'0')
      };
    }

    function fmtMMDDYYYY(s){
      const parts = getDateParts(s);
      return parts ? `${parts.mm}-${parts.dd}-${parts.yyyy}` : '';
    }

    function render(list){
      const wrap = $('#tags');
      if (!list.length){
        $('#empty').style.display = 'block';
        wrap.innerHTML = '';
        return;
      }
      $('#empty').style.display = 'none';
      wrap.innerHTML = list.map(t => {
        const id = getId(t);
        const updatedRaw = t.updatedAt || t.UpdatedAt || '';
        const updated = fmtMMDDYYYY(updatedRaw);
        const url = `/driver-ticket.html?id=${encodeURIComponent(id)}`;
        return `
          <a class="ticket-link" href="${url}">
            Ticket ${id || '(no id)'}
            ${updated ? `<div class="muted-small">Updated ${updated}</div>` : ``}
          </a>`;
      }).join('');
    }

    function updateSubtitle(count){
      const el = document.querySelector('.subtitle');
      if (!el) return;
      el.textContent = count > 0
        ? `Pending tags assigned to you (${count})`
        : `You're all caught up — no pending tags 🎉`;
    }

    async function createDraftAndOpen(){
      const btn = $('#newDraftBtn');
      if (btn) btn.disabled = true;

      try{
        const r = await fetch('/api/drafts', { method:'POST', credentials:'include' });
        const j = await r.json().catch(()=> ({}));
        if (!r.ok || j.ok === false) throw new Error(j.message || 'Could not create draft');

        // draft id is UUID
         location.href = `/driver-ticket.html?id=${encodeURIComponent(j.id)}`;

      } catch(err){
        alert(err.message || 'Could not create draft');
        if (btn) btn.disabled = false;
      }
    }

    const newDraftBtn = document.getElementById('newDraftBtn');
    if (newDraftBtn){
      newDraftBtn.addEventListener('click', createDraftAndOpen);
    }

    const logoutBtn = document.getElementById('logoutBtn');
    if (logoutBtn){
      logoutBtn.addEventListener('click', async () => {
        const prev = logoutBtn.textContent;
        logoutBtn.disabled = true;
        logoutBtn.setAttribute('data-loading', 'true');
        logoutBtn.textContent = 'Logging out...';

        try {
          const r = await fetch('/api/auth/logout', {
            method: 'POST',
            credentials: 'include'
          });
          const j = await r.json().catch(() => ({}));
          if (!r.ok || j.ok === false) throw new Error(j.message || 'Could not log out.');
          location.href = '/';
        } catch (err) {
          alert(err.message || 'Could not log out.');
          logoutBtn.disabled = false;
          logoutBtn.removeAttribute('data-loading');
          logoutBtn.textContent = prev;
        }
      });
    }

    (async () => {
      try {
        const r = await fetch('/api/me', { credentials:'include' });
        const data = await r.json().catch(()=> ({}));
        if (!data.ok) { location.href = '/'; return; }

        const profile = data.profile || {};
        const name = profile.fullName || profile.name || profile.email || 'Driver';
        const currentEmail = (profile.email || '').toLowerCase();

        $('#driverName').textContent = `Welcome, ${name}`;

        const tags = guessTags(data);
        const visible = onlyPendingForMe(tags, currentEmail);
        render(visible);
      } catch {
        alert('Connection issue. Please check internet and reload.');
      }
    })();
  </script>
</body>
</html>
